<!doctype html>
<html lang="th">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>ShipTrack — ระบบติดตามรายการส่ง</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>

  <body>
    <div id="root">
      <!-- Pre-mount Splash Screen -->
      <style>
        .splash-container {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background-color: #091426;
          z-index: 9999;
          font-family: "Noto Sans Thai", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          color: #f8f9ff;
          transition: opacity 0.5s ease-out;
        }
        .splash-logo {
          width: 80px;
          height: 80px;
          animation: splash-pulse 2s infinite ease-in-out;
          margin-bottom: 24px;
        }
        .splash-title {
          font-size: 1.5rem;
          font-weight: 800;
          letter-spacing: 0.05em;
          margin: 0 0 8px 0;
          background: linear-gradient(135deg, #38bdf8 0%, #06b6d4 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        .splash-subtitle {
          font-size: 0.875rem;
          font-weight: 500;
          color: #94a3b8;
          margin: 0 0 32px 0;
        }
        .splash-loader {
          width: 40px;
          height: 40px;
          border: 3px solid rgba(6, 182, 212, 0.1);
          border-radius: 50%;
          border-top-color: #06b6d4;
          animation: splash-spin 0.8s linear infinite;
        }
        @keyframes splash-pulse {
          0%, 100% {
            transform: scale(1);
            filter: drop-shadow(0 0 8px rgba(6, 182, 212, 0.2));
          }
          50% {
            transform: scale(1.05);
            filter: drop-shadow(0 0 20px rgba(6, 182, 212, 0.45));
          }
        }
        @keyframes splash-spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
      <div class="splash-container">
        <svg class="splash-logo" viewBox="0 0 64 64" role="img" aria-label="ShipTrack">
          <path d="M 35.0 9.2 A 23 23 0 0 1 53.2 40.8" fill="none" stroke="#5f738c" stroke-width="4.5" stroke-linecap="butt"/>
          <path d="M 50.3 46.0 A 23 23 0 0 1 13.7 46.0" fill="none" stroke="#5f738c" stroke-width="4.5" stroke-linecap="butt"/>
          <path d="M 10.8 40.8 A 23 23 0 0 1 29.0 9.2" fill="none" stroke="#5f738c" stroke-width="4.5" stroke-linecap="butt"/>
          <path d="M 18.5 41.5 L 32 20 L 45.5 41.5" fill="none" stroke="#06b6d4" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="butt"/>
        </svg>
        <h1 class="splash-title">ShipTrack</h1>
        <p class="splash-subtitle">ระบบติดตามรายการส่ง</p>
        <div class="splash-loader"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
